name: Bug Report
description: Report a bug or compatibility issue with GpuShift
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        # GpuShift Bug Report

        Please complete the required fields and attach your `latest.log`.

  - type: markdown
    attributes:
      value: |
        ## Environment

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "Example: 1.21.1"
    validations:
      required: true

  - type: dropdown
    id: mod-loader
    attributes:
      label: Mod loader
      options:
        - NeoForge
        - Fabric
        - Forge
        - Other
    validations:
      required: true

  - type: input
    id: loader-version
    attributes:
      label: Mod loader version
      placeholder: "Example: NeoForge 21.1.209"
    validations:
      required: true

  - type: input
    id: gpushift-version
    attributes:
      label: GpuShift version
      placeholder: "Example: 1.2.6"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      placeholder: "Example: NVIDIA GeForce RTX 4070"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Issue

  - type: textarea
    id: description
    attributes:
      label: Issue description
      description: Describe what happened.
      placeholder: "Explain the problem in detail."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch the game
        2. Enter a world
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Explain what should have happened instead.
      placeholder: "The game should load normally."
    validations:
      required: true

  - type: textarea
    id: mods
    attributes:
      label: Relevant installed mods
      description: List rendering, performance, shader, and particle-related mods.
      placeholder: |
        Sodium
        Distant Horizons
        Iris
        Fancy Block Particles
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Logs and evidence

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Drag and drop `latest.log` or the crash report into this field.
      placeholder: "Drag and drop latest.log here."
    validations:
      required: true

  - type: textarea
    id: media
    attributes:
      label: Screenshots or video
      description: Attach screenshots or provide a video link.
      placeholder: "Optional"
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I am using the latest available version of GpuShift.
          required: true

        - label: I have checked that this issue has not already been reported.
          required: true

        - label: I have attached the complete latest.log file.
          required: true
