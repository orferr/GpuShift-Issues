name: 🐛 Bug Report
description: Report a bug in GpuShift
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in **GpuShift**!
        Please fill out the form below as completely as possible — it helps us fix things faster.

  - type: input
    id: mod-version
    attributes:
      label: GpuShift Version
      description: The mod version (visible in the jar filename)
      placeholder: "e.g. 1.4.2"
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version
      placeholder: "e.g. 1.20.1"
    validations:
      required: true

  - type: dropdown
    id: modloader
    attributes:
      label: Mod Loader
      options:
        - Forge
        - Fabric
        - NeoForge
        - Quilt
        - Other
    validations:
      required: true

  - type: input
    id: modloader-version
    attributes:
      label: Mod Loader Version
      placeholder: "e.g. Fabric Loader 0.15.11"
    validations:
      required: false

  - type: dropdown
    id: gpu-vendor
    attributes:
      label: GPU Vendor
      options:
        - NVIDIA
        - AMD
        - Intel
        - Apple (Metal/M-series)
        - Other / Not sure
    validations:
      required: true

  - type: input
    id: gpu-model
    attributes:
      label: GPU Model
      placeholder: "e.g. RTX 3070"
    validations:
      required: true

  - type: input
    id: driver-version
    attributes:
      label: GPU Driver Version
      placeholder: "e.g. 552.44"
    validations:
      required: false

  - type: textarea
    id: other-mods
    attributes:
      label: Other Installed Mods (especially rendering-related)
      description: e.g. Sodium, Iris, Optifine, shader packs, etc.
      placeholder: |
        - Sodium 0.5.8
        - Iris 1.6.17
        - ...
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen instead?
      placeholder: A clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open GpuShift settings
        2. Enable Benchmark Mode
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Report
      description: Paste the log (latest.log, crash-report) or a pastebin/gist link. You can also drag and drop files here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Video
      description: If applicable, drag and drop files here.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I checked that a similar issue doesn't already exist
          required: true
        - label: I'm using the latest version of GpuShift
          required: true
        - label: This bug reproduces without other mod conflicts (or conflicting mods are listed above)
          required: false
