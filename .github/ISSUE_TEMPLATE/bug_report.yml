name: Bug Report
description: Report a bug or compatibility issue with GpuShift
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue with GpuShift.
        Please complete all required fields.

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.21.1"
    validations:
      required: true

  - type: dropdown
    id: mod-loader
    attributes:
      label: Mod loader
      options:
        - NeoForge
        - Fabric
        - Other
    validations:
      required: true

  - type: input
    id: loader-version
    attributes:
      label: Mod loader version
      placeholder: "NeoForge 21.1.x"
    validations:
      required: true

  - type: input
    id: gpushift-version
    attributes:
      label: GpuShift version
      placeholder: "1.3.0-beta.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue description
      description: Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch the game
        2. Enter a world
        3. ...
    validations:
      required: true

  - type: textarea
    id: mods
    attributes:
      label: Relevant installed mods
      description: List rendering, performance and particle-related mods.
      placeholder: |
        Sodium
        Distant Horizons
        Fancy Block Particles

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Drag and drop latest.log or the crash report into this field.
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I am using the latest available version of GpuShift.
          required: true
        - label: I have checked that this issue has not already been reported.
          required: true
